server {
    listen 80;
    server_name daf-plattform-2.mikehoyer.de;

    # Weiterleitung zu HTTPS (wird von Certbot automatisch ergänzt)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name daf-plattform-2.mikehoyer.de;

    # SSL-Zertifikate (werden von Certbot eingetragen)
    # ssl_certificate /etc/letsencrypt/live/daf-plattform-2.mikehoyer.de/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/daf-plattform-2.mikehoyer.de/privkey.pem;

    # Sicherheitsheader
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Upload-Limit für Audiodateien
    client_max_body_size 30M;

    # Proxy zur FastAPI-Anwendung auf Port 8002
    location / {
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Statische Dateien direkt ausliefern
    location /static/ {
        alias /var/www/daf-plattform-2/app/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
