<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login – DaF v2</title>
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
  <main class="container" style="padding-top:5rem;max-width:400px">
    <div class="card">
      <h1 class="card-title">Admin-Zugang</h1>
      <div id="err" class="alert alert-warning" style="display:none"></div>
      <input type="password" id="pw" placeholder="Passwort"
        style="width:100%;padding:0.625rem;border:1px solid var(--border);border-radius:8px;margin-bottom:1rem;font-size:0.95rem"
        onkeydown="if(e.key==='Enter')login()">
      <button class="btn btn-primary btn-full" onclick="login()">Anmelden</button>
    </div>
  </main>
  <script>
    async function login() {
      const body = new FormData();
      body.append('passwort', document.getElementById('pw').value);
      const res = await fetch('/admin/api/login', { method: 'POST', body });
      if (res.ok) window.location.href = '/admin/dashboard';
      else {
        document.getElementById('err').textContent = 'Falsches Passwort.';
        document.getElementById('err').style.display = 'block';
      }
    }
    document.getElementById('pw').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
  </script>
</body>
</html>
