<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard – DaF v2</title>
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a class="logo" href="/">DaF Sprachdiagnostik <span>v2</span></a>
      <span style="font-size:0.85rem;color:var(--text-muted)">Admin Dashboard</span>
    </div>
  </header>

  <main class="container-wide" style="padding-top:2rem;padding-bottom:4rem">
    <h1 style="font-size:1.5rem;font-weight:700;margin-bottom:1.5rem">Admin Dashboard</h1>

    <!-- Tabs -->
    <div style="display:flex;gap:0.5rem;margin-bottom:1.5rem;border-bottom:2px solid var(--border);padding-bottom:0.5rem">
      <button class="btn btn-primary" id="tab-sessions" onclick="zeigeTab('sessions')">Sessions</button>
      <button class="btn btn-outline" id="tab-codes" onclick="zeigeTab('codes')">Zugangscodes</button>
    </div>

    <!-- Sessions -->
    <div id="panel-sessions">
      <div id="sessions-loading" style="text-align:center;padding:2rem"><div class="spinner"></div></div>
      <div id="sessions-table" style="display:none">
        <table style="width:100%;border-collapse:collapse;font-size:0.85rem">
          <thead>
            <tr style="background:var(--bg);text-align:left">
              <th style="padding:0.6rem;border-bottom:2px solid var(--border)">Token</th>
              <th style="padding:0.6rem;border-bottom:2px solid var(--border)">Status</th>
              <th style="padding:0.6rem;border-bottom:2px solid var(--border)">Niveau</th>
              <th style="padding:0.6rem;border-bottom:2px solid var(--border)">Code</th>
              <th style="padding:0.6rem;border-bottom:2px solid var(--border)">Module</th>
              <th style="padding:0.6rem;border-bottom:2px solid var(--border)">Erstellt</th>
              <th style="padding:0.6rem;border-bottom:2px solid var(--border)">Aktion</th>
            </tr>
          </thead>
          <tbody id="sessions-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- Codes -->
    <div id="panel-codes" style="display:none">
      <div class="card" style="max-width:400px;margin-bottom:1.5rem">
        <h3 class="card-title">Neue Codes erstellen</h3>
        <div style="display:flex;gap:0.75rem;margin-bottom:1rem;flex-wrap:wrap">
          <div>
            <label style="font-size:0.8rem;display:block;margin-bottom:0.3rem">Anzahl</label>
            <input type="number" id="code-anzahl" value="20" min="1" max="100"
              style="width:80px;padding:0.5rem;border:1px solid var(--border);border-radius:6px">
          </div>
          <div>
            <label style="font-size:0.8rem;display:block;margin-bottom:0.3rem">Max. Nutzungen</label>
            <input type="number" id="code-max" value="2" min="1" max="10"
              style="width:80px;padding:0.5rem;border:1px solid var(--border);border-radius:6px">
          </div>
        </div>
        <button class="btn btn-primary" onclick="erstelleCodes()">Codes erstellen</button>
        <div id="neue-codes" style="margin-top:1rem;font-size:0.8rem;font-family:monospace;background:#f8fafc;padding:0.75rem;border-radius:6px;display:none;white-space:pre-wrap;max-height:200px;overflow-y:auto"></div>
      </div>

      <div id="codes-loading" style="text-align:center;padding:2rem"><div class="spinner"></div></div>
      <div id="codes-table" style="display:none">
        <table style="width:100%;border-collapse:collapse;font-size:0.85rem">
          <thead>
            <tr style="background:var(--bg);text-align:left">
              <th style="padding:0.6rem;border-bottom:2px solid var(--border)">Code</th>
              <th style="padding:0.6rem;border-bottom:2px solid var(--border)">Genutzt</th>
              <th style="padding:0.6rem;border-bottom:2px solid var(--border)">Max</th>
              <th style="padding:0.6rem;border-bottom:2px solid var(--border)">Status</th>
            </tr>
          </thead>
          <tbody id="codes-tbody"></tbody>
        </table>
      </div>
    </div>
  </main>

  <script>
    let aktuellerTab = 'sessions';

    function zeigeTab(tab) {
      aktuellerTab = tab;
      document.getElementById('panel-sessions').style.display = tab === 'sessions' ? 'block' : 'none';
      document.getElementById('panel-codes').style.display = tab === 'codes' ? 'block' : 'none';
      document.getElementById('tab-sessions').className = tab === 'sessions' ? 'btn btn-primary' : 'btn btn-outline';
      document.getElementById('tab-codes').className = tab === 'codes' ? 'btn btn-primary' : 'btn btn-outline';
      if (tab === 'sessions') ladeSessions();
      else ladeCodes();
    }

    async function ladeSessions() {
      const res = await fetch('/admin/api/sessions');
      if (!res.ok) { window.location.href = '/admin/login'; return; }
      const sessions = await res.json();

      document.getElementById('sessions-loading').style.display = 'none';
      document.getElementById('sessions-table').style.display = 'block';

      document.getElementById('sessions-tbody').innerHTML = sessions.map(s => `
        <tr style="border-bottom:1px solid var(--border)">
          <td style="padding:0.6rem;font-family:monospace;font-size:0.75rem">${s.token.substring(0,12)}…</td>
          <td style="padding:0.6rem">${s.status}</td>
          <td style="padding:0.6rem">${s.grob_niveau || '–'}</td>
          <td style="padding:0.6rem">${s.kandidat_code || '–'}</td>
          <td style="padding:0.6rem">${s.module_abgeschlossen}/${s.module_gesamt}</td>
          <td style="padding:0.6rem">${s.erstellt_am ? new Date(s.erstellt_am).toLocaleString('de-DE') : '–'}</td>
          <td style="padding:0.6rem">
            <a href="/ergebnis/${s.token}" target="_blank" class="btn btn-outline" style="padding:0.25rem 0.5rem;font-size:0.75rem">Ergebnis</a>
          </td>
        </tr>
      `).join('');
    }

    async function ladeCodes() {
      const res = await fetch('/admin/api/codes');
      if (!res.ok) { window.location.href = '/admin/login'; return; }
      const codes = await res.json();

      document.getElementById('codes-loading').style.display = 'none';
      document.getElementById('codes-table').style.display = 'block';

      document.getElementById('codes-tbody').innerHTML = codes.map(c => `
        <tr style="border-bottom:1px solid var(--border)">
          <td style="padding:0.6rem;font-family:monospace">${c.code}</td>
          <td style="padding:0.6rem">${c.genutzt}</td>
          <td style="padding:0.6rem">${c.max_nutzungen}</td>
          <td style="padding:0.6rem;color:${c.aktiv && c.genutzt < c.max_nutzungen ? 'var(--success)' : 'var(--danger)'}">
            ${c.aktiv && c.genutzt < c.max_nutzungen ? '✓ Aktiv' : '✗ Verbraucht'}
          </td>
        </tr>
      `).join('');
    }

    async function erstelleCodes() {
      const anzahl = document.getElementById('code-anzahl').value;
      const max = document.getElementById('code-max').value;
      const body = new FormData();
      body.append('anzahl', anzahl);
      body.append('max_nutzungen', max);
      const res = await fetch('/admin/api/codes/erstelle', { method: 'POST', body });
      if (!res.ok) { alert('Fehler beim Erstellen.'); return; }
      const data = await res.json();
      const el = document.getElementById('neue-codes');
      el.textContent = data.codes.join('\n');
      el.style.display = 'block';
      ladeCodes();
    }

    ladeSessions();
  </script>
</body>
</html>
