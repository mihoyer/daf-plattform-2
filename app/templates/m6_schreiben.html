<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modul 6 – Schreiben</title>
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a class="logo" href="/test/{{ token }}">DaF Sprachdiagnostik <span>v2</span></a>
      <span style="font-size:0.85rem;color:var(--text-muted)">Modul 6 von 6</span>
    </div>
    <div style="max-width:800px;margin:0 auto;padding:0 1rem">
      <div class="progress-bar"><div class="progress-bar-fill" style="width:100%"></div></div>
    </div>
  </header>

  <main class="container" style="padding-top:2rem;padding-bottom:4rem">
    <div id="loading" style="text-align:center;padding:3rem">
      <div class="spinner"></div>
      <p style="color:var(--text-muted)">Aufgabe wird geladen…</p>
    </div>

    <div id="content" style="display:none">
      <h1 style="font-size:1.5rem;font-weight:700;margin-bottom:0.4rem">✍️ Schreiben</h1>
      <p style="color:var(--text-muted);font-size:0.9rem;margin-bottom:1.5rem">
        Schreiben Sie einen kurzen Text zur folgenden Aufgabe.
      </p>

      <div class="card">
        <h3 class="card-title">Ihre Aufgabe</h3>
        <div id="aufgabe" style="font-size:1.05rem;font-weight:500;padding:1rem;background:#eff6ff;border-radius:8px;border-left:4px solid var(--primary)"></div>
      </div>

      <div class="card">
        <h3 class="card-title">Ihr Text</h3>
        <textarea id="schreibtext"
          style="width:100%;min-height:200px;padding:1rem;border:1px solid var(--border);border-radius:8px;font-size:1rem;font-family:inherit;resize:vertical;outline:none;line-height:1.7"
          placeholder="Schreiben Sie hier Ihren Text…"
          oninput="aktualisiereZaehler()"></textarea>
        <div style="display:flex;justify-content:space-between;margin-top:0.5rem;font-size:0.8rem;color:var(--text-muted)">
          <span>Empfehlung: 80–100 Wörter</span>
          <span id="wort-zaehler">0 Wörter</span>
        </div>
      </div>

      <div style="text-align:right;margin-top:1rem">
        <button class="btn btn-primary btn-lg" id="submit-btn" onclick="submitText()">
          Absenden und Test abschließen →
        </button>
      </div>
    </div>
  </main>

  <script>
    const TOKEN = '{{ token }}';

    async function ladeAufgabe() {
      const res = await fetch(`/api/m6/${TOKEN}/aufgabe`);
      if (!res.ok) { window.location.href = `/test/${TOKEN}`; return; }
      const data = await res.json();
      document.getElementById('aufgabe').textContent = data.aufgabe;
      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = 'block';
    }

    function aktualisiereZaehler() {
      const text = document.getElementById('schreibtext').value.trim();
      const woerter = text ? text.split(/\s+/).length : 0;
      document.getElementById('wort-zaehler').textContent = `${woerter} Wörter`;
    }

    async function submitText() {
      const text = document.getElementById('schreibtext').value.trim();
      if (!text) {
        alert('Bitte schreiben Sie zuerst Ihren Text.');
        return;
      }
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = 'Wird analysiert…';

      const res = await fetch(`/api/m6/${TOKEN}/submit`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text }),
      });

      if (res.ok) {
        window.location.href = `/ergebnis/${TOKEN}`;
      } else {
        btn.disabled = false;
        btn.textContent = 'Absenden und Test abschließen →';
        alert('Fehler beim Absenden. Bitte versuchen Sie es erneut.');
      }
    }

    ladeAufgabe();
  </script>
</body>
</html>
